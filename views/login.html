<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Agua</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">💧</div>
                <h1 class="auth-title">Purificadora de Agua</h1>
                <p class="auth-subtitle">Ventas al Mayoreo</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="correo" class="form-label required">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="correo" 
                        name="correo" 
                        class="form-control" 
                        placeholder="tu@correo.com"
                        required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Iniciar Sesión
                </button>
            </form>

            <div class="auth-footer">
                ¿No tienes cuenta? 
                <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script src="../assets/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const correo = formData.get('correo');
            const password = formData.get('password');
            
            await login(correo, password);
        });
    </script>
</body>
</html>
